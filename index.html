<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zundamstr</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="header">
    <span class="logo">zundamstr</span>
    <span id="user" class="user hidden"></span>
  </header>

  <main id="app">
    <section id="boot">
      <p class="prompt">&gt; 起動中なのだ</p>
      <p id="boot-msg" class="msg"></p>
    </section>

    <section id="timeline" class="hidden"></section>
  </main>

  <div id="status" class="hidden"></div>

  <form id="composer" class="hidden">
    <span class="composer-prompt">&gt;&gt;</span>
    <span class="cursor">_</span>
    <input id="composer-input" type="text" placeholder="" autocomplete="off" />
    <button id="composer-send" type="submit">[ 送信 ]</button>
  </form>

  <script type="module" src="main.js"></script>
</body>
</html>
